spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:

        # ── Auth Service ──────────────────────────────────────
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/gateway/auth/**
          filters:
            - StripPrefix=1

        # ── Catalog Service ───────────────────────────────────
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/gateway/catalog/**
          filters:
            - StripPrefix=1

        # ── Order Service ─────────────────────────────────────
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/gateway/orders/**
          filters:
            - StripPrefix=1

        # ── Admin Service ─────────────────────────────────────
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/gateway/admin/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
services:

  # ─── Infrastructure ───────────────────────────────────────────────────────

  kafka:
    image: apache/kafka:3.7.0
    container_name: shopsphere-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─── Redis ───────────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: shopsphere-redis
    ports:
      - "6379:6379"
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Logging (Loki + Grafana) ─────────────────────────────────────────

  loki:
    image: grafana/loki:3.2.1
    container_name: shopsphere-loki
    ports:
      - "3100:3100"
    networks:
      - shopsphere-network
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:3.2.1
    container_name: shopsphere-promtail
    ports:
      - "9080:9080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - shopsphere-network

  grafana:
    image: grafana/grafana:11.6.0
    container_name: shopsphere-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - shopsphere-network

  # ─── Spring Cloud ─────────────────────────────────────────────────────────

  eureka-server:
    build: ./eureka-server
    container_name: shopsphere-eureka
    ports:
      - "8761:8761"
    networks:
      - shopsphere-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8761/actuator/health -O -"]
      interval: 15s
      timeout: 10s
      retries: 5

  config-server:
    build: ./config-server
    container_name: shopsphere-config
    ports:
      - "8888:8888"
    volumes:
      - ./config-repo:/config-repo:ro
    networks:
      - shopsphere-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:8888/actuator/health -O -"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Services ─────────────────────────────────────────────────────────────

  auth-service:
    build: ./auth-service
    container_name: shopsphere-auth
    ports:
      - "8081:8081"
    networks:
      - shopsphere-network
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/auth_db
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  catalog-service:
    build: ./catalog-service
    container_name: shopsphere-catalog
    ports:
      - "8082:8082"
    networks:
      - shopsphere-network
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/catalog_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  order-service:
    build: ./order-service
    container_name: shopsphere-order
    ports:
      - "8083:8083"
    networks:
      - shopsphere-network
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/order_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin-service:
    build: ./admin-service
    container_name: shopsphere-admin
    ports:
      - "8084:8084"
    networks:
      - shopsphere-network
    depends_on:
      redis:
        condition: service_healthy
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/admin_db
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api-gateway:
    build: ./api-gateway
    container_name: shopsphere-gateway
    ports:
      - "8080:8080"
    networks:
      - shopsphere-network
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: "optional:configserver:http://config-server:8888"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ─── Networks ─────────────────────────────────────────────────────────────

networks:
  shopsphere-network:
    driver: bridge
